<!DOCTYPE html>
<html lang="en">
<head>
    <!-- The head section stores page settings and links the CSS file -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Partridge Soundboard</title>

    <!-- External stylesheet for creative styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header introduces the soundboard -->
    <header>
        <h1>Alan Partridge Soundboard</h1>
        <p>Click a sample button to play the associated audio clip.</p>
    </header>

    <!-- Main section contains the soundboard grid -->
    <main>
        <section class="soundboard" aria-label="Alan Partridge audio samples">

            <!-- Buttons are generated here using JavaScript -->
            <div id="sampleGrid" class="sample-grid"></div>

        </section>
    </main>

    <!-- Footer provides final page information -->
    <footer>
        <p>Chapter 5 Embedded Content - Bonus Soundboard Exercise</p>
    </footer>

    <!-- JavaScript file controls the soundboard audio playback -->
    <script src="index.js"></script>
</body>
</html>
