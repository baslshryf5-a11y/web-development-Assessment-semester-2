<!DOCTYPE html>
<html lang="en">
<head>
    <!-- The head section stores page settings and links the CSS file -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Colour Guessing Game</title>

    <!-- External stylesheet for the game design -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header introduces the RGB guessing game -->
    <header>
        <h1>RGB Colour Guessing Game</h1>
        <p>Choose the colour that matches the RGB value shown below.</p>
    </header>

    <!-- Main game area -->
    <main class="game-container">

        <!-- Game information panel -->
        <section class="game-card">
            <h2 id="rgbValue">RGB(0, 0, 0)</h2>
            <p id="message">Pick the correct colour to start playing.</p>

            <!-- Colour options are generated by JavaScript -->
            <div id="colourOptions" class="colour-options"></div>

            <!-- Score and round information -->
            <div class="score-board">
                <p id="scoreText">Score: 0</p>
                <p id="roundText">Round: 1 of 5</p>
            </div>

            <!-- Replay button appears when the game ends -->
            <button id="replayButton" class="hidden">Play Again</button>
        </section>

    </main>

    <!-- JavaScript file controls the game behaviour -->
    <script src="index.js"></script>
</body>
</html>
